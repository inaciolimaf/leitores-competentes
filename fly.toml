# fly.toml app configuration file generated for leitores-competentes on 2026-04-18T20:01:34-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'leitores-competentes'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  OPENROUTER_MODEL = 'google/gemini-2.5-flash-lite'
  USE_TAVILY_CACHE = 'true'

[[mounts]]
  source = 'lc_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
